<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>스마트 스위치</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap');

  :root {
    --bg: #0f0f11;
    --surface: #1a1a1f;
    --surface2: #222228;
    --border: rgba(255,255,255,0.07);
    --text: #f0eff5;
    --muted: #7a7a8a;
    --on-color: #c8f060;
    --on-glow: rgba(200,240,96,0.18);
    --off-color: #ff5f5f;
    --off-glow: rgba(255,95,95,0.15);
    --accent: #8b7fff;
    --accent-glow: rgba(139,127,255,0.2);
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: -200px; left: 50%;
    transform: translateX(-50%);
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(139,127,255,0.06) 0%, transparent 70%);
    pointer-events: none;
  }

  .container { width: 100%; max-width: 340px; }

  .header { text-align: center; margin-bottom: 36px; }
  .header-eyebrow {
    font-family: 'DM Mono', monospace;
    font-size: 10px; letter-spacing: 0.2em;
    color: var(--accent); text-transform: uppercase; margin-bottom: 8px;
  }
  .header-title { font-size: 28px; font-weight: 800; letter-spacing: -0.02em; line-height: 1.1; }
  .header-title span { color: var(--on-color); }

  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 20px; padding: 20px; margin-bottom: 12px; transition: border-color 0.3s;
  }
  .card.connected { border-color: rgba(200,240,96,0.25); }
  .card-label {
    font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.15em;
    color: var(--muted); text-transform: uppercase; margin-bottom: 14px;
  }

  .status-row { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
  .status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--muted); flex-shrink: 0; transition: background 0.3s, box-shadow 0.3s;
  }
  .status-dot.active { background: var(--on-color); box-shadow: 0 0 8px var(--on-color); }
  .status-dot.scanning { background: var(--accent); animation: pulse 1s ease-in-out infinite; }
  @keyframes pulse {
    0%,100% { box-shadow: 0 0 0 0 var(--accent-glow); }
    50%      { box-shadow: 0 0 0 6px transparent; }
  }
  .status-text { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--muted); transition: color 0.3s; }
  .status-text.active { color: var(--on-color); }

  .connect-btn {
    width: 100%; padding: 14px; border-radius: 12px;
    border: 1px solid var(--border); background: var(--surface2);
    color: var(--text); font-family: 'Syne', sans-serif;
    font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s;
  }
  .connect-btn:hover { border-color: var(--accent); color: var(--accent); }
  .connect-btn:active { transform: scale(0.98); }
  .connect-btn.connected { border-color: rgba(255,95,95,0.4); color: var(--off-color); background: rgba(255,95,95,0.06); }
  .connect-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .device-name {
    font-family: 'DM Mono', monospace; font-size: 11px;
    color: var(--accent); margin-top: 10px; text-align: center; min-height: 16px;
  }

  /* 제어 카드 */
  .ctrl-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 20px; padding: 20px; margin-bottom: 12px;
  }

  /* 버튼 2개 그리드 */
  .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .sw-btn {
    position: relative;
    padding: 30px 12px 24px;
    border-radius: 16px; border: 1px solid var(--border);
    background: var(--surface2); cursor: pointer;
    transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
    overflow: hidden; display: flex; flex-direction: column;
    align-items: center; gap: 10px;
  }
  .sw-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .sw-btn:not(:disabled):active { transform: scale(0.96); }

  .sw-btn .btn-icon {
    font-size: 38px; line-height: 1;
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
  }
  .sw-btn .btn-title {
    font-family: 'Syne', sans-serif;
    font-size: 22px; font-weight: 800; letter-spacing: 0.1em;
    transition: color 0.3s;
  }
  .btn-on .btn-title  { color: var(--on-color); }
  .btn-off .btn-title { color: var(--off-color); }
  .sw-btn .btn-label {
    font-family: 'Syne', sans-serif;
    font-size: 14px; font-weight: 800;
    letter-spacing: -0.01em; line-height: 1.4;
    text-align: center; transition: color 0.3s;
    word-break: keep-all;
  }
  .sw-btn .btn-sub {
    font-family: 'DM Mono', monospace;
    font-size: 9px; letter-spacing: 0.15em; opacity: 0.4;
  }

  /* ON 버튼 */
  .btn-on { border-color: rgba(200,240,96,0.2); background: rgba(200,240,96,0.04); }
  .btn-on .btn-label { color: var(--on-color); }
  .btn-on:not(:disabled):hover {
    border-color: rgba(200,240,96,0.45); background: rgba(200,240,96,0.09);
    box-shadow: 0 0 24px var(--on-glow);
  }
  .btn-on.active {
    border-color: var(--on-color);
    background: rgba(200,240,96,0.13);
    box-shadow: 0 0 36px var(--on-glow);
  }
  .btn-on.active .btn-icon { transform: scale(1.15); }

  /* OFF 버튼 */
  .btn-off { border-color: rgba(255,95,95,0.2); background: rgba(255,95,95,0.04); }
  .btn-off .btn-label { color: var(--off-color); }
  .btn-off:not(:disabled):hover {
    border-color: rgba(255,95,95,0.45); background: rgba(255,95,95,0.09);
    box-shadow: 0 0 24px var(--off-glow);
  }
  .btn-off.active {
    border-color: var(--off-color);
    background: rgba(255,95,95,0.13);
    box-shadow: 0 0 36px var(--off-glow);
  }
  .btn-off.active .btn-icon { transform: scale(1.15); }

  .sw-btn.flash { animation: btn-flash 0.25s ease-out; }
  @keyframes btn-flash { 0% { filter: brightness(1.8); } 100% { filter: brightness(1); } }

  /* 로그 */
  .log-card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 20px; }
  .log-list {
    font-family: 'DM Mono', monospace; font-size: 11px;
    display: flex; flex-direction: column; gap: 6px;
    max-height: 100px; overflow-y: auto;
  }
  .log-entry { display: flex; gap: 10px; align-items: baseline; }
  .log-time { color: var(--muted); flex-shrink: 0; }
  .log-msg  { color: var(--text); opacity: 0.8; }
  .log-msg.ok   { color: var(--on-color); }
  .log-msg.err  { color: var(--off-color); }
  .log-msg.info { color: var(--accent); }

  .footer-note {
    font-family: 'DM Mono', monospace; font-size: 10px;
    color: var(--muted); text-align: center; margin-top: 16px;
  }

  .ripple {
    position: absolute; border-radius: 50%;
    transform: scale(0); animation: ripple-anim 0.5s linear;
    background: rgba(255,255,255,0.08); pointer-events: none;
  }
  @keyframes ripple-anim { to { transform: scale(4); opacity: 0; } }
</style>
</head>
<body>

<div class="container">

  <div class="header">
    <div class="header-eyebrow">BLE 4.0 · CC2541</div>
    <div class="header-title">옴팡이를 위한<br>스마트 <span>전등</span> 스위치</div>
  </div>

  <!-- 연결 카드 -->
  <div class="card" id="conn-card">
    <div class="card-label">블루투스 연결</div>
    <div class="status-row">
      <div class="status-dot" id="dot"></div>
      <div class="status-text" id="status-text">연결 안 됨</div>
    </div>
    <button class="connect-btn" id="conn-btn" onclick="handleConnect()">
      BLE 기기 검색 및 연결
    </button>
    <div class="device-name" id="device-name"></div>
  </div>

  <!-- 제어 카드 -->
  <div class="ctrl-card">
    <div class="card-label">전등 제어</div>
    <div class="btn-grid">
      <button class="sw-btn btn-on" id="btn-on" disabled onclick="sendCommand('1', this)">
        <span class="btn-icon">☀</span>
        <span class="btn-title">ON</span>
        <span class="btn-label">경현 불 켜줘</span>
        <span class="btn-sub">SEND · 1</span>
      </button>
      <button class="sw-btn btn-off" id="btn-off" disabled onclick="sendCommand('0', this)">
        <span class="btn-icon">◑</span>
        <span class="btn-title">OFF</span>
        <span class="btn-label">경현 불 꺼줘</span>
        <span class="btn-sub">SEND · 0</span>
      </button>
    </div>
  </div>

  <!-- 로그 카드 -->
  <div class="log-card">
    <div class="card-label" style="margin-bottom:10px">시리얼 로그</div>
    <div class="log-list" id="log-list">
      <div class="log-entry">
        <span class="log-time">--:--:--</span>
        <span class="log-msg info">앱 시작 — BLE 연결을 눌러주세요</span>
      </div>
    </div>
  </div>

  <div class="footer-note">Made by tony &amp; claude</div>

</div>

<script>
  const SERVICE_UUID = '0000ffe0-0000-1000-8000-00805f9b34fb';
  const CHAR_UUID    = '0000ffe1-0000-1000-8000-00805f9b34fb';

  let device = null;
  let characteristic = null;
  let connected = false;

  function addLog(msg, type = '') {
    const list = document.getElementById('log-list');
    const ts = new Date().toTimeString().slice(0,8);
    const entry = document.createElement('div');
    entry.className = 'log-entry';
    entry.innerHTML = `<span class="log-time">${ts}</span><span class="log-msg ${type}">${msg}</span>`;
    list.appendChild(entry);
    list.scrollTop = list.scrollHeight;
    if (list.children.length > 20) list.removeChild(list.firstChild);
  }

  function setConnected(isConnected, name) {
    connected = isConnected;
    const dot     = document.getElementById('dot');
    const stTx    = document.getElementById('status-text');
    const connBtn = document.getElementById('conn-btn');
    const card    = document.getElementById('conn-card');
    const devName = document.getElementById('device-name');
    const btnOn   = document.getElementById('btn-on');
    const btnOff  = document.getElementById('btn-off');

    if (isConnected) {
      dot.className    = 'status-dot active';
      stTx.textContent = '연결됨';
      stTx.className   = 'status-text active';
      connBtn.textContent = '연결 해제';
      connBtn.className   = 'connect-btn connected';
      card.className   = 'card connected';
      devName.textContent = '▸ ' + name;
      btnOn.disabled  = false;
      btnOff.disabled = false;
    } else {
      dot.className    = 'status-dot';
      stTx.textContent = '연결 안 됨';
      stTx.className   = 'status-text';
      connBtn.textContent = 'BLE 기기 검색 및 연결';
      connBtn.className   = 'connect-btn';
      card.className   = 'card';
      devName.textContent = '';
      btnOn.disabled  = true;
      btnOff.disabled = true;
      btnOn.classList.remove('active');
      btnOff.classList.remove('active');
    }
  }

  async function handleConnect() {
    if (connected) {
      if (device && device.gatt.connected) device.gatt.disconnect();
      connected = false; device = null; characteristic = null;
      setConnected(false, '');
      addLog('연결 해제됨', 'err');
      return;
    }
    if (!navigator.bluetooth) {
      addLog('이 브라우저는 Web Bluetooth를 지원하지 않아요', 'err');
      addLog('Android Chrome 또는 Edge를 사용해 주세요', 'err');
      return;
    }
    const dot     = document.getElementById('dot');
    const stTx    = document.getElementById('status-text');
    const connBtn = document.getElementById('conn-btn');
    dot.className    = 'status-dot scanning';
    stTx.textContent = '검색 중...';
    connBtn.disabled = true;
    addLog('BLE 기기 검색 시작...', 'info');

    try {
      device = await navigator.bluetooth.requestDevice({
        filters: [
          { services: [SERVICE_UUID] },
          { namePrefix: 'HM' },
          { namePrefix: 'BT' },
          { namePrefix: 'AT' },
        ],
        optionalServices: [SERVICE_UUID]
      });
      addLog('기기 발견: ' + device.name, 'info');
      device.addEventListener('gattserverdisconnected', () => {
        setConnected(false, '');
        characteristic = null;
        addLog('연결이 끊어졌어요', 'err');
      });
      const server  = await device.gatt.connect();
      const service = await server.getPrimaryService(SERVICE_UUID);
      characteristic = await service.getCharacteristic(CHAR_UUID);
      try {
        await characteristic.startNotifications();
        characteristic.addEventListener('characteristicvaluechanged', (e) => {
          const val = new TextDecoder().decode(e.target.value).trim();
          addLog('수신: ' + val, 'ok');
        });
      } catch(e) {}
      setConnected(true, device.name || 'Unknown');
      addLog('연결 성공! 버튼을 눌러보세요', 'ok');
    } catch (err) {
      dot.className    = 'status-dot';
      stTx.textContent = '연결 안 됨';
      addLog(err.name === 'NotFoundError' ? '기기를 찾지 못했어요 (취소됨)' : '오류: ' + err.message, 'err');
    } finally {
      connBtn.disabled = false;
    }
  }

  async function sendCommand(cmd, btnEl) {
    if (!characteristic) { addLog('연결 상태를 확인해 주세요', 'err'); return; }

    const isOn = cmd === '1';
    const label = isOn ? 'ON — 불 켜기' : 'OFF — 불 끄기';

    // 누른 버튼 active, 반대 버튼 해제
    document.getElementById('btn-on').classList.toggle('active', isOn);
    document.getElementById('btn-off').classList.toggle('active', !isOn);

    // flash + 리플
    btnEl.classList.add('flash');
    setTimeout(() => btnEl.classList.remove('flash'), 300);
    const ripple = document.createElement('span');
    ripple.className = 'ripple';
    ripple.style.cssText = 'width:200px;height:200px;left:50%;top:50%;margin-left:-100px;margin-top:-100px;';
    btnEl.appendChild(ripple);
    setTimeout(() => ripple.remove(), 600);

    try {
      await characteristic.writeValue(new TextEncoder().encode(cmd));
      addLog('전송: "' + cmd + '" → ' + label, 'ok');
    } catch (err) {
      document.getElementById('btn-on').classList.remove('active');
      document.getElementById('btn-off').classList.remove('active');
      addLog('전송 실패: ' + err.message, 'err');
    }
  }
</script>
</body>
</html>
